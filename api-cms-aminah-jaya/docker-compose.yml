services:
  api-cms-aminah-jaya:
    image: api-cms-aminah-jaya:latest
    container_name: api-cms-aminah-jaya
    restart: always
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=${PORT:-8001}
      - RUST_LOG=${RUST_LOG:-info}
      - MONGO_HOST=${MONGO_HOST}
      - MONGO_PORT=${MONGO_PORT}
      - MONGO_USER=${MONGO_USER}
      - MONGO_PASS=${MONGO_PASS}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY=${R2_ACCESS_KEY}
      - R2_SECRET_KEY=${R2_SECRET_KEY}
      - R2_BUCKET=${R2_BUCKET}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
      - INTEGRASI_API_URL=${INTEGRASI_API_URL:-http://api-integrasi-aminah-jaya:8002}
    networks:
      - aminah-network
networks:
  aminah-network:
    external: true
