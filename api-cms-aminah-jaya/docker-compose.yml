services:
  api-cms-aminah-jaya:
    image: api-cms-aminah-jaya:latest
    container_name: api-cms-aminah-jaya
    restart: always
    network_mode: host
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=${PORT:-8001}
      - RUST_LOG=${RUST_LOG:-info}
      - MONGO_HOST=${MONGO_HOST}
      - MONGO_PORT=${MONGO_PORT}
      - MONGO_USER=${MONGO_USER}
      - MONGO_PASS=${MONGO_PASS}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY=${R2_ACCESS_KEY}
      - R2_SECRET_KEY=${R2_SECRET_KEY}
      - R2_BUCKET=${R2_BUCKET}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
      - BITESHIP_API_KEY=${BITESHIP_API_KEY}
      - BITESHIP_ORIGIN_LAT=${BITESHIP_ORIGIN_LAT}
      - BITESHIP_ORIGIN_LNG=${BITESHIP_ORIGIN_LNG}
      - BITESHIP_ORIGIN_ADDRESS=${BITESHIP_ORIGIN_ADDRESS}
      - BITESHIP_ORIGIN_POSTAL_CODE=${BITESHIP_ORIGIN_POSTAL_CODE}
      - BITESHIP_ORIGIN_CONTACT_NAME=${BITESHIP_ORIGIN_CONTACT_NAME}
      - BITESHIP_ORIGIN_CONTACT_PHONE=${BITESHIP_ORIGIN_CONTACT_PHONE}
      - BITESHIP_DEFAULT_COURIERS=${BITESHIP_DEFAULT_COURIERS}
      - SHIPPING_RATE_CACHE_TTL_HOURS=${SHIPPING_RATE_CACHE_TTL_HOURS}
