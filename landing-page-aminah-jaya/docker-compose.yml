services:
  lp-aminah-jaya:
    image: lp-aminah-jaya:latest
    container_name: lp-aminah-jaya
    restart: always
    ports:
      - "${HOST_PORT:-3003}:${HOST_PORT:-3003}"
    environment:
      - NODE_ENV=production
      - ORIGIN=http://${VPS_IP:-103.103.20.58}:${HOST_PORT:-3003}
      - NITRO_URL=http://${VPS_IP:-103.103.20.58}:${HOST_PORT:-3003}
      - PROTOCOL=http
      - HOST=0.0.0.0
      - PORT=${HOST_PORT:-3003}
